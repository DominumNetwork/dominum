<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Games Library</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
  :root {
    --primary: #6f42c1;
    --primary-hover: #5936a6;
    --accent: #f6c90e;
    --text: #e6e6fa;
    --bg: #1a1030;
    --border: rgba(255, 255, 255, 0.1);
    --radius: 14px;
    --card-bg: rgba(255, 255, 255, 0.05);
    --shadow-sm: 0 4px 10px rgba(0,0,0,0.2);
    --shadow: 0 8px 30px rgba(0,0,0,0.5);
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 1.5rem;
  }

  .controls-wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 2rem;
    max-width: 900px;
  }

  .control-input {
    padding: 0.8rem 1.2rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: var(--shadow-sm);
  }

  .control-input:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.3);
  }

  .control-input:focus {
    background: rgba(255, 255, 255, 0.15);
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(246, 201, 14, 0.2), var(--shadow);
    transform: translateY(-2px);
  }

  #searchBar {
    flex: 1 1 250px;
  }
  
  select.control-input {
    cursor: pointer;
    flex: 0 1 auto;
  }

  select.control-input option {
    background-color: #1a1a1a;
    color: #fff;
  }

  #container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1.2rem;
  }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.9) translateY(15px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .zone-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    opacity: 0; 
    animation: popIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  }

  .zone-item:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow: var(--shadow);
    border-color: rgba(255, 255, 255, 0.3);
    z-index: 2;
  }

  .img-wrapper {
    width: 100%;
    aspect-ratio: 1;
    overflow: hidden;
    background-color: rgba(0,0,0,0.2);
  }

  .zone-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .zone-item:hover img {
    transform: scale(1.1);
  }

  .zone-item button {
    padding: 0.9rem 0.5rem;
    border: none;
    background: transparent;
    color: var(--text);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s ease;
  }

  .zone-item:hover button {
    color: #fff;
  }

  #modalOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    padding: 2rem;
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  #gameModal {
    width: 100%;
    max-width: 1100px;
    height: 85vh;
    background: var(--bg);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    transform: scale(0.95);
    animation: modalPop 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  @keyframes modalPop {
    to { transform: scale(1); }
  }

  #fullscreenHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    background: rgba(0, 0, 0, 0.3);
    border-bottom: 1px solid var(--border);
    color: #fff;
  }

  #gameTitle {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .header-controls {
    display: flex;
    gap: 10px;
  }

  .header-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0.6rem 0.9rem;
    transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-btn:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(246, 201, 14, 0.3);
  }

  .header-btn:active {
    transform: translateY(0);
  }

  #zoneFullscreenFrame {
    flex: 1;
    width: 100%;
    border: none;
    background: #000;
  }
</style>
</head>
<body>

<div class="controls-wrapper">
  <select id="providerSelect" class="control-input" onchange="loadProvider()">
    <option value="gn-math">GN-Math</option>
    <option value="truffled">Truffled.lol</option>
  </select>

  <input type="text" id="searchBar" class="control-input" placeholder="Search games..." oninput="applyFilters()">
  
  <select id="sortSelect" class="control-input" onchange="applyFilters()">
    <option value="a-z">A-Z</option>
    <option value="z-a">Z-A</option>
  </select>
</div>

<div id="container">Loading games...</div>

<div id="modalOverlay">
  <div id="gameModal">
    <div id="fullscreenHeader">
      <h2 id="gameTitle">Game Title</h2>
      <div class="header-controls">
        <button id="downloadBtn" class="header-btn" title="Download Game">
          <i class="fas fa-download"></i>
        </button>
        <button id="fullscreenBtn" class="header-btn" title="Fullscreen">
          <i class="fas fa-expand"></i>
        </button>
        <button id="closeFullscreen" class="header-btn" title="Close">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
    <iframe id="zoneFullscreenFrame"></iframe>
  </div>
</div>

<script>
const container = document.getElementById('container');
const searchBar = document.getElementById('searchBar');
const sortSelect = document.getElementById('sortSelect');
const providerSelect = document.getElementById('providerSelect');

const overlay = document.getElementById('modalOverlay');
const iframe = document.getElementById('zoneFullscreenFrame');
const closeBtn = document.getElementById('closeFullscreen');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const downloadBtn = document.getElementById('downloadBtn');
const gameTitle = document.getElementById('gameTitle');

const gnMathCoverURL = "https://cdn.jsdelivr.net/gh/gn-math/covers@main";
const gnMathHtmlURL = "https://cdn.jsdelivr.net/gh/gn-math/html@main";

let allGames = [];
let currentGame = null; // Keeps track of the currently opened game for downloading

async function loadProvider() {
  container.innerHTML = '<div style="width:100%; text-align:center; padding: 2rem; color: #888;">Fetching games...</div>';
  allGames = [];
  const provider = providerSelect.value;

  try {
    if (provider === 'gn-math') {
      const response = await fetch("https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json");
      const rawZones = await response.json();
      
      allGames = rawZones.filter(z => z.id >= 0 && z.id <= 5000).map((z) => {
        return {
          name: z.name,
          cover: z.cover.replace('{COVER_URL}', gnMathCoverURL).replace('{HTML_URL}', gnMathHtmlURL),
          url: z.url,
          isAbsolute: z.url.startsWith('http')
        };
      });

    } else if (provider === 'truffled') {
      const response = await fetch("https://cdn.jsdelivr.net/gh/aukak/truffled@main/public/js/json/g.json");
      const data = await response.json();
      
      allGames = (data.games || []).map((g) => {
        let gameUrl = g.url;
        let thumb = g.thumbnail;
        
        if (!gameUrl.startsWith('http')) {
            gameUrl = 'https://truffled.lol' + (gameUrl.startsWith('/') ? '' : '/') + gameUrl;
        }
        if (!thumb.startsWith('http')) {
            thumb = 'https://truffled.lol' + (thumb.startsWith('/') ? '' : '/') + thumb;
        }

        return {
          name: g.name,
          cover: thumb,
          url: gameUrl,
          isAbsolute: true
        };
      });
    }

    applyFilters();

  } catch (e) {
    console.error(e);
    container.innerHTML = '<div style="width:100%; text-align:center; padding: 2rem; color: #ff4444;">Failed to load games. Check console for details.</div>';
  }
}

function applyFilters() {
  const query = searchBar.value.toLowerCase();
  const sortMethod = sortSelect.value;

  let filtered = allGames.filter(g => g.name.toLowerCase().includes(query));

  filtered.sort((a, b) => {
    if (sortMethod === 'a-z') {
      return a.name.localeCompare(b.name);
    } else if (sortMethod === 'z-a') {
      return b.name.localeCompare(a.name);
    }
    return 0;
  });

  displayGames(filtered);
}

function displayGames(games) {
  container.innerHTML = '';
  if (games.length === 0) {
    container.innerHTML = '<div style="width:100%; text-align:center; padding: 2rem; color: #888;">No games found.</div>';
    return;
  }

  games.forEach((game, index) => {
    const item = document.createElement('div');
    item.className = 'zone-item';
    
    const delay = Math.min(index * 0.03, 1.5);
    item.style.animationDelay = `${delay}s`;

    const imgWrapper = document.createElement('div');
    imgWrapper.className = 'img-wrapper';

    const img = document.createElement('img');
    img.dataset.src = game.cover;
    img.alt = game.name;
    img.loading = 'lazy';

    const btn = document.createElement('button');
    btn.textContent = game.name;
    
    item.onclick = () => openGame(game);
    btn.onclick = (e) => {
      e.stopPropagation();
      openGame(game);
    };

    imgWrapper.appendChild(img);
    item.appendChild(imgWrapper);
    item.appendChild(btn);
    container.appendChild(item);
  });

  const imgs = document.querySelectorAll('img[data-src]');
  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const img = e.target;
        img.src = img.dataset.src;
        obs.unobserve(img);
      }
    });
  }, { rootMargin: '100px', threshold: 0.1 });
  imgs.forEach(i => observer.observe(i));
}

async function openGame(game) {
  currentGame = game;
  overlay.style.display = 'flex';
  gameTitle.textContent = game.name;

  if (game.isAbsolute) {
    iframe.src = game.url;
  } else {
    const fullUrl = game.url.replace('{COVER_URL}', gnMathCoverURL).replace('{HTML_URL}', gnMathHtmlURL);
    try {
      const response = await fetch(fullUrl);
      const htmlContent = await response.text();
      const blob = new Blob([htmlContent], { type: 'text/html' });
      const blobUrl = URL.createObjectURL(blob);
      iframe.src = blobUrl;
      iframe.onload = () => URL.revokeObjectURL(blobUrl);
    } catch (e) {
      console.error('Blob load failed, falling back to direct URL:', e);
      iframe.src = fullUrl;
    }
  }
}

downloadBtn.onclick = async () => {
  if (!currentGame) return;

  let fileContent = "";
  let fullUrl = currentGame.isAbsolute 
      ? currentGame.url 
      : currentGame.url.replace('{COVER_URL}', gnMathCoverURL).replace('{HTML_URL}', gnMathHtmlURL);

  try {
    const response = await fetch(fullUrl);
    if (!response.ok) throw new Error("CORS or Network Error");
    fileContent = await response.text();
  } catch (error) {
    console.log("Direct fetch blocked, generating wrapper HTML...");
    fileContent = `
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>${currentGame.name}</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe src="${fullUrl}" allowfullscreen="true"></iframe>
</body>
</html>`;
  }

  const blob = new Blob([fileContent], { type: 'text/html' });
  const downloadUrl = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  a.href = downloadUrl;
  a.download = `${currentGame.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.html`;
  
  document.body.appendChild(a);
  a.click();
  
  document.body.removeChild(a);
  URL.revokeObjectURL(downloadUrl);
};

closeBtn.onclick = () => {
  overlay.style.display = 'none';
  iframe.src = '';
  currentGame = null;
};

overlay.onclick = (e) => {
  if (e.target === overlay) {
    closeBtn.click();
  }
}

fullscreenBtn.onclick = () => {
  iframe.requestFullscreen().catch(() => {
    alert('Fullscreen mode is not supported or blocked.');
  });
};

loadProvider();
</script>

<script>
const root = document.documentElement;
const themes = {
  default:{"--bg":"#0b0a16","--accent":"#7a5cff","--blue":"#00bfff","--text":"#e6e6ff",
           "--surface":"rgba(255,255,255,0.05)","--border":"rgba(255,255,255,0.1)","--card-bg":"rgba(255,255,255,0.03)"},
  cyber:{"--bg":"#050c1b","--accent":"#39ff14","--blue":"#00ffff","--text":"#e0ffe0",
         "--surface":"rgba(0,255,0,0.05)","--border":"rgba(0,255,0,0.1)","--card-bg":"rgba(0,255,0,0.03)"},
  sunset:{"--bg":"#1a0b0b","--accent":"#ff6f61","--blue":"#ffa500","--text":"#fff0e6",
          "--surface":"rgba(255,110,100,0.05)","--border":"rgba(255,110,100,0.1)","--card-bg":"rgba(255,110,100,0.03)"},
  neon:{"--bg":"#0f0020","--accent":"#ff00ff","--blue":"#00ffff","--text":"#ffffff",
        "--surface":"rgba(255,0,255,0.05)","--border":"rgba(255,0,255,0.1)","--card-bg":"rgba(255,0,255,0.03)"},
  darkred:{"--bg":"#1b0000","--accent":"#ff0000","--blue":"#cc0000","--text":"#ffe6e6",
           "--surface":"rgba(255,0,0,0.05)","--border":"rgba(255,0,0,0.1)","--card-bg":"rgba(255,0,0,0.03)"},
  dnv2:{"--bg": "#050007","--accent": "#ff00de","--blue": "#00fff7","--text": "#ffffff",
         "--surface": "rgba(255, 0, 255, 0.05)","--border": "rgba(255, 0, 255, 0.15)","--card-bg": "rgba(15, 0, 30, 0.7)"},
  matrix: {"--bg": "#001100","--accent": "#00ff00","--blue": "#33ff33","--text": "#99ff99",
         "--surface": "rgba(0, 255, 0, 0.05)","--border": "rgba(0, 255, 0, 0.15)","--card-bg": "rgba(0, 50, 0, 0.7)"}
};

function applyTheme(theme){
  Object.entries(theme).forEach(([k,v])=>root.style.setProperty(k,v));
}

(function(){
  const name = localStorage.getItem("dominum-theme") || "default";
  if(name === "custom"){
    const custom = JSON.parse(localStorage.getItem("dominum-custom-theme") || "{}");
    applyTheme(custom);
  } else applyTheme(themes[name]);
})();
</script>
</body>
</html>
